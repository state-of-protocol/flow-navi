<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Navigasi Pintar AI</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome untuk Ikon (jika digunakan, sebagai alternatif kepada SVG) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <!-- Input Overlay - Atas Skrin -->
        <div class="top-overlay">
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i> <!-- Ikon Carian -->
                <input type="text" id="search-input" placeholder="Cari lokasi atau alamat...">
                <!-- Ikon carian atau lokasi -->
            </div>
            <div class="offline-mode-toggle">
                <span>Mod Luar Talian</span>
                <label class="switch">
                    <input type="checkbox" id="offline-mode-checkbox">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <!-- Peta Google Maps (atau nanti, Maplibre) -->
        <div id="map"></div>

        <!-- Antaramuka Navigasi Utama - Overlay Bawah -->
        <div class="navigation-ui">
            <!-- Anak Panah Navigasi -->
            <img src="arrow-up.svg" id="navigation-arrow" alt="Arah Navigasi" class="arrow-straight">

            <!-- Paparan Informasi Jarak dan Arahan -->
            <div class="info-display">
                <div id="distance-display">-- m lagi</div>
                <div id="instruction-display">• Sedia untuk navigasi...</div>
            </div>

            <!-- Mesej Gemini AI -->
            <div id="gemini-message" class="gemini-hint">
                <p>Ok boss, depan sikit je lagi, nanti benti belok kiri masuk Jalan Talan Razan ye. Hati-hati!</p>
                <button class="close-gemini"><i class="fas fa-times"></i></button>
            </div>

            <!-- Bar Status Berwarna -->
            <div id="status-bar" class="status-bar-base status-green"></div>

            <!-- Butang Bawah (Muat Turun & Kira Semula) -->
            <div class="bottom-buttons">
                <button id="download-route-button" class="action-button download-button">
                    <i class="fas fa-cloud-download-alt"></i> Muat Dorn Laluan Ini
                </button>
                <button id="recalculate-route-button" class="action-button recalculate-button">
                    <i class="fas fa-redo-alt"></i> Kira Semula Laluan
                </button>
            </div>
        </div>
    </div>

    <!-- MUATKAN GOOGLE MAPS JAVASCRIPT API (akan diganti kemudian) -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY&callback=initMap"></script>
    <script src="script.js"></script>
</body>
</html>
